<html>
    <head>
        <title>Registration form</title>
    </head>
    <body>
        <h1>Registration Form in Html</h1>
    </body>
    <form>
        <table>
            <tr>
                <td>
                    Name:
                </td>
                <td>
                    <input type = "text" placeholder="Name" name="">
                </td>
            </tr>
            <tr>
                <td>
                    Phone Number:
                </td>
                <td>
                    <input type = "phone" placeholder="9867*******">
                </td>
            </tr>
            <tr>
                <td>
                    Email:
                </td>
                <td>
                    <input type = "email" placeholder="example23@*8">
                </td>
            </tr>
             <tr>
                <td>
                    Passward:
                </td>
                <td>
                    <input type = "passward" placeholder="passward">
                </td>
            </tr>
            <tr>
                <td>
                    Gender:
                </td>
                <td>
                    <input type = "Radio"  name="gender" >Male
                    <input type = "Radio"  name="gender" >Female
                </td>
            </tr>
             <tr>
                <td>
                    Date of Birth:
                </td>
                <td>
                    <input type = "date"
                </td>
            </tr>
        </table>
    </form>
</html>
